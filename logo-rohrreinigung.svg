<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" role="img" aria-label="Rohrreinigung Meißner">
  <defs>
    <linearGradient id="pipeG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1d4ed8"/>
      <stop offset="1" stop-color="#0b1220"/>
    </linearGradient>
  </defs>
  <!-- Mark: stylized pipe with water drop -->
  <g transform="translate(20,40)">
    <rect x="0" y="40" width="120" height="32" rx="4" fill="url(#pipeG)"/>
    <rect x="44" y="0" width="32" height="120" rx="4" fill="url(#pipeG)"/>
    <rect x="-6" y="34" width="14" height="44" rx="2" fill="#0b1220"/>
    <rect x="112" y="34" width="14" height="44" rx="2" fill="#0b1220"/>
    <rect x="38" y="-6" width="44" height="14" rx="2" fill="#0b1220"/>
    <rect x="38" y="112" width="44" height="14" rx="2" fill="#0b1220"/>
    <!-- Water drop -->
    <path d="M60 38 C 50 52, 50 62, 60 62 C 70 62, 70 52, 60 38 Z" fill="#facc15"/>
  </g>
  <!-- Brand text -->
  <g font-family="Sora, system-ui, sans-serif" fill="#0b1220">
    <text x="170" y="98" font-size="40" font-weight="800" letter-spacing="-1">Rohrreinigung</text>
    <text x="170" y="148" font-size="40" font-weight="800" letter-spacing="-1" fill="#1d4ed8">Meißner</text>
  </g>
</svg>
